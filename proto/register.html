<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记账应用 - 注册</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #e8f5e9 0%, #f1f8f2 50%, #e0f2f1 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .register-container {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 20px 60px rgba(34, 197, 94, 0.1);
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon svg {
      width: 28px;
      height: 28px;
      fill: white;
    }
    .logo-text {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .title {
      text-align: center;
      font-size: 28px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      font-size: 15px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      transition: all 0.2s;
      outline: none;
    }
    .form-input:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
    }
    .form-input::placeholder {
      color: #9ca3af;
    }
    .password-hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 6px;
    }
    .btn-primary {
      width: 100%;
      height: 48px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: #9ca3af;
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }
    .divider::before { margin-right: 16px; }
    .divider::after { margin-left: 16px; }
    .login-link {
      text-align: center;
      font-size: 14px;
      color: #6b7280;
    }
    .login-link a {
      color: #22c55e;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
    }
    .login-link a:hover {
      text-decoration: underline;
    }
    .footer-text {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      margin-top: 32px;
    }
    @media (max-width: 480px) {
      .register-container {
        padding: 32px 24px;
        border-radius: 16px;
      }
      .title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.16-1.46-3.27-3.4h1.96c.10 1.05.82 1.87 2.65 1.87 1.96 0 2.4-.98 2.4-1.59 0-.83-.44-1.61-2.67-2.14-2.48-.6-4.18-1.62-4.18-3.67 0-1.72 1.39-2.84 3.11-3.21V4h2.67v1.95c1.86.45 2.79 1.86 2.85 3.39H14.3c-.05-1.11-.64-1.87-2.22-1.87-1.5 0-2.4.68-2.4 1.64 0 .84.65 1.39 2.67 1.91s4.18 1.39 4.18 3.91c-.01 1.83-1.38 2.83-3.12 3.16z"/></svg>
      </div>
      <span class="logo-text">记账本</span>
    </div>
    <h1 class="title">创建账户</h1>
    <p class="subtitle">开始您的财务管理之旅</p>
    <form>
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input type="text" class="form-input" placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label class="form-label">邮箱</label>
        <input type="email" class="form-input" placeholder="请输入邮箱地址">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" placeholder="请输入密码">
        <p class="password-hint">密码至少8位，包含字母和数字</p>
      </div>
      <div class="form-group">
        <label class="form-label">确认密码</label>
        <input type="password" class="form-input" placeholder="请再次输入密码">
      </div>
      <button type="submit" class="btn-primary">注册</button>
    </form>
    <div class="divider">或</div>
    <p class="login-link">已有账户？<a href="login.html">立即登录</a></p>
    <p class="footer-text">简洁记账，轻松理财</p>
  </div>
</body>
</html>
